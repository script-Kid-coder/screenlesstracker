{{ define "main" }}
<article>
  <div class="article-hero">
    <div class="container">
      <div class="article-meta">
        {{ with .Params.categories }}<a href="/categories/{{ index . 0 | urlize }}/" class="post-category-badge">{{ index . 0 }}</a>{{ end }}
        <span>{{ .Date.Format "January 2, 2006" }}</span>
        <span>{{ .ReadingTime }} min read</span>
      </div>
      <h1 class="article-title">{{ .Title }}</h1>
      {{ if .Params.description }}<p style="color:var(--color-text-muted);font-size:var(--text-lg);max-width:60ch">{{ .Params.description }}</p>{{ end }}
    </div>
  </div>
  {{ if .Params.image }}
  <div style="max-width:var(--content-default);margin-inline:auto;padding-inline:var(--space-6);padding-top:var(--space-8)">
    <img src="{{ .Params.image }}" alt="{{ .Title }}" style="border-radius:var(--radius-xl);width:100%;aspect-ratio:16/9;object-fit:cover" loading="lazy">
  </div>
  {{ end }}
  <div class="article-body">
    {{ .Content }}
  </div>
</article>
{{ end }}
